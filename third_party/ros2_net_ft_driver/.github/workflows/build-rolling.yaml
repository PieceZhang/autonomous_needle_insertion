name: Build Rolling

on:
  workflow_dispatch:
    branches:
      - rolling

  pull_request:
    branches:
      - rolling

  push:
    branches:
      - rolling

  schedule:
    - cron: "03 1 * * *"

jobs:
  binary:
    uses: ./.github/workflows/reusable-ici.yaml
    with:
      ros_distro: rolling
      ros_repo: main
      upstream_workspace: ros2_net_ft_driver.rolling
      ref_for_scheduled_build: rolling
      before_install_target_dependencies: |
        sudo apt-get -qq update && sudo apt-get install -y pkg-config libasio-dev libcurlpp-dev libcurl4-openssl-dev
