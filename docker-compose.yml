version: "3.9"

services:
  ros:
    build:
      context: .
      dockerfile: Dockerfile
    image: aniros:kilted-dev   # optional, gives a stable tag to the built image
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-kilted"

    # keep these as you have them
    network_mode: "host"
    ipc: "host"
    working_dir: /ws
    stdin_open: true
    tty: true

    # keep the ROS entrypoint so non-interactive runs inherit the ROS env
    entrypoint: [ "/ros_entrypoint.sh" ]
    command: >
      bash -lc "
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        if [ -f /ws/install/setup.bash ]; then source /ws/install/setup.bash; fi;
        echo 'ROS '$ROS_DISTRO' container ready at /ws';
        tail -f /dev/null
      "

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1

    volumes:
      - ./ros2_ws:/ws
      - ./tool_definition:/root/tool_definition:ro
      - ~/.ros:/root/.ros
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    # (Optional) run as host user to avoid root-owned files
    # user: "${UID:-1000}:${GID:-1000}"

    # (Optional) USB devices, serial, etc.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

    # (Optional) GPU passthrough on modern Docker/Compose
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
