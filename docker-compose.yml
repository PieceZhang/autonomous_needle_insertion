services:
  ros:
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      dockerfile: Dockerfile
    image: aniros:jazzy-dev   # optional, gives a stable tag to the built image
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-jazzy"

    # keep these as you have them
    network_mode: "host"
    ipc: "host"
    working_dir: /ws
    stdin_open: true
    tty: true

    # keep the ROS entrypoint so non-interactive runs inherit the ROS env
    entrypoint: [ "/ros_entrypoint.sh" ]
    command: >
      bash -lc "
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        if [ -f /ws/install/setup.bash ]; then source /ws/install/setup.bash; fi;
        echo 'ROS $${ROS_DISTRO:-unknown} container ready at /ws';
        tail -f /dev/null
      "

    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_HOME=/ws/.ros
      - ROS_LOG_DIR=/ws/.ros/log

    volumes:
      - ./ros2_ws:/ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

    # (Optional) USB devices, serial, etc.
    # devices:
    #   - /dev/bus/usb:/dev/bus/usb

    # (Optional) GPU passthrough on modern Docker/Compose
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]
