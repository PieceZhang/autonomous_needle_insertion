x-ros-base-env: &ros_base_env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-42}
  RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
  DISPLAY: ${DISPLAY}
  QT_X11_NO_MITSHM: 1
  ROS_HOME: ${WS_DIR:-/ani_ws}/.ros
  ROS_LOG_DIR: ${WS_DIR:-/ani_ws}/.ros/log

x-ros-common: &ros_common
  user: "${UID:-1000}:${GID:-1000}"
  build:
    context: .
    dockerfile: Dockerfile
  image: aniros:jazzy-dev
  network_mode: "host"
  ipc: "host"
  working_dir: ${WS_DIR:-/ani_ws}
  stdin_open: true
  tty: true
  entrypoint: ["/ros_entrypoint.sh"]
  environment:
    <<: *ros_base_env
  device_cgroup_rules:
    - "c 81:* rmw"
    - "c 189:* rmw"
  volumes:
    - ./workspace:${WS_DIR:-/ani_ws}:rw
    - /tmp/.X11-unix:/tmp/.X11-unix:rw
    - /etc/passwd:/etc/passwd:ro
    - /etc/group:/etc/group:ro
    - /dev:/dev

services:
  ur_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver"
    profiles: ["default", "ur_test", "dev"]
    command: >
      bash -lc "
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=${UR_ROBOT_IP} launch_rviz:=false
      "
    healthcheck:
      # Real readiness = robot reachable + External Control running + robot mode RUNNING. Wait for:
      #  1) /io_and_status_controller/robot_program_running == true (External Control)
      #  2) /io_and_status_controller/robot_mode contains "RUNNING" (motors on, brakes released)
      # If the robot is off/unreachable, the timeouts will fail and the service is UNHEALTHY.
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_program_running | grep -q 'data: true' && timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_mode | grep -q 'RUNNING'"]
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_mode | grep -q 'RUNNING'"]
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ur_driver_mock:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver-mock"
    profiles: ["default"]
    command: >
      bash -lc "
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=0.0.0.0 use_mock_hardware:=true initial_joint_controller:=joint_trajectory_controller launch_rviz:=false
      "
    healthcheck:
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q /urscript_interface/script_command"]
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  polaris_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-driver"
    profiles: ["default", "polaris_test", "dev"]
    command: >
      bash -lc "
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        echo 'Starting Polaris driver with IP ' ${POLARIS_IP};
        ros2 launch ndi_bringup polaris_vega.launch.py ip:=${POLARIS_IP} gui:=false
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q ndi"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  polaris_camera_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-camera-driver"
    profiles: ["default", "gscam2-test", "dev"]
    environment:
      <<: *ros_base_env
      GSCAM_CONFIG: ${GSCAM_CONFIG:-"rtspsrc location=rtsp://${POLARIS_IP}:554/video latency=${GSCAM_LATENCY} protocols=${GSCAM_PROTOCOL} drop-on-latency=true do-retransmission=false ! rtph264depay ! h264parse ! avdec_h264 max-threads=1 ! videoconvert ! video/x-raw,format=RGB ! videoscale ! video/x-raw,width=${GSCAM_VIDEO_WIDTH},height=${GSCAM_VIDEO_WIDTH},framerate=30/1 ! queue max-size-buffers=1 max-size-time=0 max-size-bytes=0 leaky=downstream"}
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        echo 'Starting gscam2 for Polaris Vega VT camera ...';
        ros2 run gscam2 gscam_main --ros-args -p frame_id:=vega_vt_camera -p camera_name:=vega_vt_visible -p image_encoding:=rgb8 -p use_gst_timestamps:=false -p sync_sink:=false -p use_sensor_data_qos:=true -p reopen_on_eof:=true -p camera_info_url:='file:///${WS_DIR:-/ani_ws}/calibration/polaris_camera_cali_dummy.yaml' -r image_raw:=vega_vt/image_raw -r camera_info:=vega_vt/camera_info
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/vega_vt/image_raw'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  realsense_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-realsense-driver"
    profiles: ["default", "dev"]
    command: >
      bash -lc "
        echo 'Starting RealSense driver';
        ros2 launch realsense2_camera rs_launch.py
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/camera/color/image_raw'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ati_ft_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ati-ft-driver"
    profiles: ["default", "dev"]
    command: >
      bash -lc "
        if [ -f /opt/ati_ws/install/setup.bash ]; then source /opt/ati_ws/install/setup.bash; fi;
        echo 'Starting ATI F/T sensor driver';
        ros2 launch net_ft_driver net_ft_broadcaster_isolated.launch.py ip_address:=${ATI_SENSOR_IP} sensor_type:=${ATI_SENSOR_TYPE} rdt_sampling_rate:=${ATI_SAMPLING_RATE} use_hardware_biasing:=${ATI_HARDWARE_BIASING}
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/ati_ft_broadcaster/wrench'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  usb_video_grabber:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-usb-video-grabber"
    profiles: [ "default", "dev" ]
    # Give this container access to /dev/video* via the 'video' group
    group_add:
      - "video"
    # Override volumes: same as ros_common, but WITHOUT /dev:/dev
    volumes:
      - ./workspace:${WS_DIR:-/ani_ws}:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    # Map exactly one host V4L2 device into the container as /dev/usb_grabber
    # Set USB_VIDEO_DEVICE in your .env file, e.g. USB_VIDEO_DEVICE=/dev/video3
    devices:
      - "${USB_VIDEO_DEVICE:-/dev/video0}:/dev/usb_grabber"
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        echo 'Host device' ${USB_VIDEO_DEVICE} 'is mapped to /dev/usb_grabber in container';
        echo 'Running v4l2_camera_node on /dev/usb_grabber...';
        ros2 run v4l2_camera v4l2_camera_node --ros-args -p video_device:=/dev/usb_grabber -p image_size:=[$USB_VIDEO_WIDTH,$USB_VIDEO_HEIGHT] -p framerate:=$USB_VIDEO_FPS -p camera_info_url:='file:///${WS_DIR:-/ani_ws}/calibration/usb_grabber_cali_dummy.yaml' -r image_raw:=/usb_grabber/image_raw
      "
    healthcheck:
      test:
        ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/usb_grabber/image_raw'"]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  keyboard_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-keyboard-driver"
    profiles: ["default", "dev"]
    command: >
      bash -lc "
        if [ -f /opt/kb_ws/install/setup.bash ]; then source /opt/kb_ws/install/setup.bash; fi;
        echo 'Starting keyboard driver';
        ros2 launch keystroke listen.launch.py
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/glyphkey_pressed'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  rosbag_recorder:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-rosbag-recorder"
    profiles: ["default", "dev"]
    depends_on:
      keyboard_driver:
        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo '启动 rosbag 录制键盘控制节点 ...';
        python3 /ani_ws/rosbag_recorder_control.py
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 node list | grep -q rosbag_recorder_key_sub"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  dev:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-dev"
    profiles: ["dev"]
    depends_on:
      ur_driver:
        condition: service_healthy
      polaris_driver:
        condition: service_healthy
      polaris_camera_driver:
        condition: service_healthy
      realsense_driver:
        condition: service_healthy
      ati_ft_driver:
        condition: service_healthy
      usb_video_grabber:
        condition: service_healthy
      keyboard_driver:
        condition: service_healthy
      rosbag_recorder:
        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        if [ ! -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then
          cd ${WS_DIR:-/ani_ws};
          colcon build --symlink-install --packages-select ${PACKAGE_NAME:-/auto_needle_insertion};
        fi;
        source ${WS_DIR:-/ani_ws}/install/setup.bash;
        echo 'Development container with all drivers';
        exec sleep infinity
      "
    restart: unless-stopped
