x-ros-base-env: &ros_base_env
  ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}  # both ani-workstation and Zed2 are 0
  RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
  DISPLAY: ${DISPLAY}
  QT_X11_NO_MITSHM: 1
  ROS_HOME: /ani_ws/.ros
  ROS_LOG_DIR: /ani_ws/.ros/log

# ── Shared volumes & runtime settings ──────────────────────────────────────
x-ros-volumes: &ros_volumes
  - ${HOST_WS_DIR:-${PWD}}:/ani_ws:rw
  - ${HOST_ROSBAG_DIR:-${PWD}/rosbag_recording}:/ani_ws/rosbag_recording:rw
  - /tmp/.X11-unix:/tmp/.X11-unix:rw
  - /etc/passwd:/etc/passwd:ro
  - /etc/group:/etc/group:ro
  - /dev:/dev

x-ros-base: &ros_base
  user: "${UID:-1000}:${GID:-1000}"
  group_add:
    - "${DOCKER_GID}"
  network_mode: "host"
  ipc: "host"
  working_dir: /ani_ws
  stdin_open: true
  tty: true
  entrypoint: ["/ros_entrypoint.sh"]
  environment:
    <<: *ros_base_env
  device_cgroup_rules:
    - "c 81:* rmw"
    - "c 189:* rmw"
  volumes: *ros_volumes

# ── Per-image anchors (one per Dockerfile stage) ──────────────────────────
x-ros-app: &ros_app
  <<: *ros_base
  build:
    context: .
    dockerfile: Dockerfile
    target: app
  image: aniros-app:jazzy

x-ros-ndi: &ros_ndi
  <<: *ros_base
  build:
    context: .
    dockerfile: Dockerfile
    target: ndi
  image: aniros-ndi:jazzy

x-ros-franka: &ros_franka
  <<: *ros_base
  build:
    context: .
    dockerfile: Dockerfile
    target: franka
  image: aniros-franka:jazzy

x-ros-console: &ros_console
  <<: *ros_base
  build:
    context: .
    dockerfile: Dockerfile
    target: console
  image: aniros-guidance-console:latest

services:
  # ─── Topic-conflict resolution strategy ────────────────────────────────
  #  Multiple ros2_control drivers (UR, Franka, ATI) share a single DDS
  #  domain (ROS_DOMAIN_ID).  To avoid /robot_description, /controller_manager
  #  and /joint_states collisions:
  #
  #  1. If the driver's launch file has a `namespace:=` parameter, use it.
  #     (Franka does: namespace:=franka)
  #
  #  2. If the driver provides an "isolated" launch variant with unique node
  #     names, use that.  (ATI: net_ft_broadcaster_isolated.launch.py)
  #
  #  3. If neither (a) nor (b) is available (driver hardcodes absolute topic
  #     names), add --ros-args remaps in the compose command, e.g.:
  #       ros2 launch pkg driver.launch.py ... \
  #         --ros-args \
  #         --remap /robot_description:=/my_prefix/robot_description \
  #         --remap /controller_manager:=/my_prefix/controller_manager \
  #         --remap /joint_states:=/my_prefix/joint_states
  #     This works on ANY ROS 2 node at the RCL layer — no source changes needed.
  #
  #  Do NOT use separate ROS_DOMAIN_IDs + a bridge container — it adds
  #  latency, complexity, and maintenance burden for no real benefit.
  # ───────────────────────────────────────────────────────────────────────

  # ─── UR Robot Arm ──────────────────────────────────────────────────────
  ur_driver:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver"
    profiles: ["default", "ur_test", "dev"]
    environment:
      <<: *ros_base_env
    command: >
      bash -lc "
        if [ -f ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=${UR_ROBOT_IP} kinematics_params_file:=${RUNTIME_WS_DIR:-/ani_ws}/calibration/ur5e_calibration.yaml launch_rviz:=false
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; timeout 2 ros2 topic echo /joint_states --once > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ur_driver_mock:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver-mock"
    profiles: ["default"]
    environment:
      <<: *ros_base_env
    command: >
      bash -lc "
        if [ -f ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=0.0.0.0 use_mock_hardware:=true initial_joint_controller:=joint_trajectory_controller kinematics_params_file:=${RUNTIME_WS_DIR:-/ani_ws}/calibration/ur5e_calibration.yaml launch_rviz:=false
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── Franka Robot Arm ─────────────────────────────────────────────────
  franka_driver:
    <<: *ros_franka
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-franka-driver"
    profiles: ["default", "franka_test", "dev"]
    environment:
      <<: *ros_base_env
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: 8428281856
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/franka_ws/install/setup.bash ]; then source /opt/franka_ws/install/setup.bash; fi;
        echo 'Starting Franka driver with robot type' ${FRANKA_ROBOT_TYPE:-fr3} ', robot IP' ${FRANKA_ROBOT_IP:-dont-care} ', use_fake_hardware=' ${FRANKA_USE_FAKE_HARDWARE:-true};
        ros2 launch franka_bringup franka.launch.py robot_type:=${FRANKA_ROBOT_TYPE:-fr3} robot_ip:=${FRANKA_ROBOT_IP:-dont-care} use_fake_hardware:=${FRANKA_USE_FAKE_HARDWARE:-true} load_gripper:=${FRANKA_LOAD_GRIPPER:-false} namespace:=franka
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/franka_ws/install/setup.bash ]; then source /opt/franka_ws/install/setup.bash; fi;"]
      interval: 5s
      timeout: 5s
      retries: 2
      start_period: 20s
    restart: unless-stopped

  # ─── NDI Polaris Tracker ──────────────────────────────────────────────
  polaris_driver:
    <<: *ros_ndi
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-driver"
    profiles: ["default", "polaris_test", "dev", "console-test"]
    command: >
      bash -lc "
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        echo 'Starting Polaris driver with IP ' ${POLARIS_IP};
        ros2 launch ndi_bringup polaris_vega.launch.py ip:=${POLARIS_IP} gui:=false
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q ndi"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  polaris_camera_driver:
    <<: *ros_ndi
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-camera-driver"
    profiles: ["default", "gscam2-test", "dev"]
    environment:
      <<: *ros_base_env
      GSCAM_CONFIG: ${GSCAM_CONFIG:-"rtspsrc location=rtsp://${POLARIS_IP}:554/video latency=${GSCAM_LATENCY} protocols=${GSCAM_PROTOCOL} drop-on-latency=true do-retransmission=false ! rtph264depay ! h264parse ! avdec_h264 max-threads=1 ! videoconvert ! video/x-raw,format=RGB ! videoscale ! video/x-raw,width=${GSCAM_VIDEO_WIDTH},height=${GSCAM_VIDEO_WIDTH},framerate=30/1 ! queue max-size-buffers=1 max-size-time=0 max-size-bytes=0 leaky=downstream"}
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        echo 'Starting gscam2 for Polaris Vega VT camera ...';
        ros2 run gscam2 gscam_main --ros-args -p frame_id:=vega_vt_camera -p camera_name:=vega_vt_visible -p image_encoding:=rgb8 -p use_gst_timestamps:=false -p sync_sink:=false -p use_sensor_data_qos:=true -p reopen_on_eof:=true -p camera_info_url:='file:///${RUNTIME_WS_DIR:-/ani_ws}/calibration/polaris_camera_cali_dummy.yaml' -r image_raw:=vega_vt/image_raw -r camera_info:=vega_vt/camera_info
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/vega_vt/image_raw'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  polaris_image_compressed:
    <<: *ros_ndi
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-image-compressed"
    profiles: ["default", "gscam2-test", "dev"]
    depends_on:
      polaris_camera_driver:
        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        echo 'Republishing /vega_vt/image_raw -> /vega_vt/image_raw/compressed';
        ros2 run image_transport republish raw compressed in:=/vega_vt/image_raw out/compressed:=/vega_vt/image_raw/compressed
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/vega_vt/image_raw/compressed'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── ATI Force/Torque Sensor ──────────────────────────────────────────
  ati_ft_driver:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ati-ft-driver"
    profiles: ["default", "dev", "ati_test"]
    command: >
      bash -lc "
        if [ -f /opt/ati_ws/install/setup.bash ]; then source /opt/ati_ws/install/setup.bash; fi;
        echo 'Starting ATI F/T sensor driver';
        ros2 launch net_ft_driver net_ft_broadcaster_isolated.launch.py ip_address:=${ATI_SENSOR_IP} sensor_type:=${ATI_SENSOR_TYPE} rdt_sampling_rate:=${ATI_SAMPLING_RATE} use_hardware_biasing:=${ATI_HARDWARE_BIASING}
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/ati_ft_broadcaster/wrench'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # ─── USB Video Grabber ────────────────────────────────────────────────
  usb_video_grabber:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-usb-video-grabber"
    profiles: [ "default", "dev" ]
    group_add:
      - "video"
    volumes:
      - ${HOST_WS_DIR:-${PWD}}:/ani_ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    devices:
      - "${USB_VIDEO_DEVICE:-/dev/video0}:/dev/usb_grabber"
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        echo 'Host device' ${USB_VIDEO_DEVICE} 'is mapped to /dev/usb_grabber in container';
        echo 'Running v4l2_camera_node on /dev/usb_grabber...';
        ros2 run v4l2_camera v4l2_camera_node --ros-args -p video_device:=/dev/usb_grabber -p image_size:=[$USB_VIDEO_WIDTH,$USB_VIDEO_HEIGHT] -p framerate:=$USB_VIDEO_FPS -p camera_info_url:='file:///${RUNTIME_WS_DIR:-/ani_ws}/calibration/usb_grabber_cali_dummy.yaml' -r image_raw:=/usb_grabber/image_raw
      "
    healthcheck:
      test:
        ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/usb_grabber/image_raw'"]
      interval: 3s
      timeout: 3s
      retries: 3
      start_period: 3s
    restart: unless-stopped

  # ─── Application-layer Services ───────────────────────────────────────
  rqt_task_ui:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-rqt-task-ui"
    profiles: ["default", "dev"]
    command: >
      bash -lc "
        set -e;
        cd ${RUNTIME_WS_DIR:-/ani_ws};
        if [ ! -f ${RUNTIME_WS_DIR:-/ani_ws}/rqt_task_interface/setup.py ]; then
          echo 'rqt_task_interface package not found at /ani_ws/rqt_task_interface. Please place the files and retry.'; exit 1;
        fi;
        colcon build --symlink-install --packages-select rqt_task_interface;
        source install/setup.bash;
        echo 'Starting RQT Task Interface (publishing /task_info @1Hz)...';
        exec rqt --standalone rqt_task_interface
      "
    restart: unless-stopped

  us_visualizer:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-us-visualizer"
    profiles: ["default", "dev"]
    depends_on:
      usb_video_grabber:
        condition: service_healthy
      polaris_driver:
        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        if [ -f ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash; fi;
        python3 ${RUNTIME_WS_DIR:-/ani_ws}/tools/us_coor_decode_visualizer_useNeedle.py
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/visualize/us_imaging'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  keyboard_driver:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-keyboard-driver"
    profiles: ["default", "dev"]
    command: >
      bash -lc "
        if [ -f /opt/kb_ws/install/setup.bash ]; then source /opt/kb_ws/install/setup.bash; fi;
        echo 'Starting keyboard driver';
        ros2 launch keystroke listen.launch.py
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q '/glyphkey_pressed'"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  ati_ft_nano17_driver:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ati-ft-nano17-driver"
    profiles: [ "default", "dev" ]
    command: >
      bash -lc "
        set -e;
        cd ${RUNTIME_WS_DIR:-/ani_ws};
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        colcon build --symlink-install --packages-select needle_deflection_system;
        source install/setup.bash;
        echo 'Running ATI force sensor driver...';
        ros2 run needle_deflection_system ati_force_sensor_driver
      "
    healthcheck:
      test: [ "CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; if [ -f ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash; fi; ros2 topic list | grep -q '/force_torque'" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  needle_deflection_calculator:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-needle-deflection-calculator"
    profiles: [ "default", "dev" ]
    command: >
      bash -lc "
        set -e;
        if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;
        source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash;
        echo 'Running needle deflection calculator...';
        ros2 run needle_deflection_system needle_deflection_calculator
      "
    depends_on:
      ati_ft_nano17_driver:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; if [ -f ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${RUNTIME_WS_DIR:-/ani_ws}/install/setup.bash; fi; ros2 topic list | grep -q '/needle_deflection'" ]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  guidance-console:
    <<: *ros_console
    image: aniros-guidance-console:latest
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-console"
    profiles: ["console-test"]
    working_dir: /ani_ws/guidance_console
    environment:
      <<: *ros_base_env
      UI_HOST: 0.0.0.0
      UI_PORT: ${GUIDANCE_CONSOLE_PORT:-8050}
      UI_DATA_ROOT: ${RUNTIME_WS_DIR:-/ani_ws}
      PYTHONUNBUFFERED: 1
    command: ["python", "app.py"]
    depends_on:
      polaris_driver:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-lc", "python - <<'PY'\nimport os, urllib.request\nport = os.environ.get('UI_PORT', '8050')\nurllib.request.urlopen(f'http://127.0.0.1:{port}/', timeout=2).read(1)\nPY"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  # ─── Dev Containers ───────────────────────────────────────────────────
  dev:
    <<: *ros_app
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-dev"
    profiles: ["dev"]
    depends_on:
      ur_driver:
        condition: service_healthy
      franka_driver:
        condition: service_healthy
      polaris_driver:
        condition: service_healthy
      polaris_camera_driver:
        condition: service_healthy
      polaris_image_compressed:
        condition: service_healthy
      ati_ft_driver:
        condition: service_healthy
      usb_video_grabber:
        condition: service_healthy
      keyboard_driver:
        condition: service_healthy
      us_visualizer:
        condition: service_healthy
#      ati_ft_nano17_driver:
#        condition: service_healthy
#      needle_deflection_calculator:
#        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        cd ${RUNTIME_WS_DIR:-/ani_ws};
        colcon build --symlink-install --packages-select auto_needle_insertion;
        source install/setup.bash;
        echo 'Development container with all drivers';
        exec sleep infinity
      "
    restart: unless-stopped

  franka-dev:
    <<: *ros_franka
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-franka-dev"
    profiles: ["franka-test"]
    depends_on:
      franka_driver:
        condition: service_healthy
    command: >
      bash -lc "
        set -e;
        cd ${RUNTIME_WS_DIR:-/ani_ws};
        colcon build --symlink-install --packages-select auto_needle_insertion;
        source install/setup.bash;
        echo 'Development container with all drivers';
        exec sleep infinity
      "
    restart: unless-stopped
