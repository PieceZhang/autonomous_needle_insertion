services:
  # Common build/runtime base for both services
  # (Reuse the same image and settings via YAML merge key)
  x-ros-common: &ros_common
    user: "${UID:-1000}:${GID:-1000}"
    build:
      context: .
      dockerfile: Dockerfile
    image: aniros:jazzy-dev
    network_mode: "host"
    ipc: "host"
    working_dir: ${WS_DIR:-/ani_ws}
    stdin_open: true
    tty: true
    entrypoint: [ "/ros_entrypoint.sh" ]
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - RMW_IMPLEMENTATION=${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_HOME=${WS_DIR:-/ani_ws}/.ros
      - ROS_LOG_DIR=${WS_DIR:-/ani_ws}/.ros/log
    volumes:
      - ./workspace:${WS_DIR:-/ani_ws}:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro

  # Service 1: UR driver (long-running)
  ur_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver"
    profiles: ["default", "ur_test", "dev"]
    command: >
      bash -lc "
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=${UR_ROBOT_IP} launch_rviz:=false
      "
    healthcheck:
      # Real readiness = robot reachable + External Control running + robot mode RUNNING. Wait for:
      #  1) /io_and_status_controller/robot_program_running == true (External Control)
      #  2) /io_and_status_controller/robot_mode contains "RUNNING" (motors on, brakes released)
      # If the robot is off/unreachable, the timeouts will fail and the service is UNHEALTHY.
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_program_running | grep -q 'data: true' && timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_mode | grep -q 'RUNNING'"]
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; timeout 5s ros2 topic echo -n 1 /io_and_status_controller/robot_mode | grep -q 'RUNNING'"]
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # Service 2: UR driver with mock hardware(long-running)
  ur_driver_mock:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-driver-mock"
    profiles: ["default"]
    command: >
      bash -lc "
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Starting UR driver with IP ' ${UR_ROBOT_IP};
        ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5e robot_ip:=0.0.0.0 use_mock_hardware:=true initial_joint_controller:=joint_trajectory_controller launch_rviz:=false
      "
    healthcheck:
#      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q /urscript_interface/script_command"]
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi;"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Service 2: NDI Polaris driver (long-running)
  polaris_driver:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-polaris-driver"
    profiles: ["default", "polaris_test"]
    command: >
      bash -lc "
        if [ -f /opt/ndi_ws/install/setup.bash ]; then source /opt/ndi_ws/install/setup.bash; fi;
        echo 'Starting Polaris driver with IP ' ${POLARIS_IP};
        ros2 launch ndi_bringup polaris_vega.launch.py ip:=${POLARIS_IP} gui:=false
      "
    healthcheck:
      test: ["CMD", "bash", "-lc", "set -e; if [ -f /opt/ros/$$ROS_DISTRO/setup.bash ]; then source /opt/ros/$$ROS_DISTRO/setup.bash; fi; ros2 topic list | grep -q ndi"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  # Service 3: Test robot arm with one-shot EE +Z 10 mm motion via URScript
  ur_move_z:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-ur5e-move-z"
    profiles: ["ur_test"]
    depends_on:
      ur_driver:
        condition: service_healthy
    command: >
      bash -lc "
        if [ -f ${WS_DIR:-/ani_ws}/install/setup.bash ]; then source ${WS_DIR:-/ani_ws}/install/setup.bash; fi;
        echo 'Waiting for UR driver readiness...';
        for i in {1..5}; do
          if ros2 topic list | grep -q '/urscript_interface/script_command'; then echo 'UR driver ready.'; break; fi;
          sleep 1;
        done;
        python3 ${WS_DIR:-/ani_ws}/ee_move_urscript.py
      "
    restart: "no"

  # Service 4: Container for development
  dev:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-dev"
    profiles: ["dev"]
    depends_on:
      ur_driver:
        condition: service_healthy
#      polaris_driver:
#        condition: service_healthy
    command: >
      bash -lc "
        echo 'Development container with all drivers';
        exec sleep infinity
      "
    restart: unless-stopped

  # Service 5: Bare container
  bare:
    <<: *ros_common
    container_name: "${COMPOSE_PROJECT_NAME:-ros2}-bare"
    profiles: ["bare"]
    command: >
      bash -lc "
        echo 'Bare container with no drivers';
        exec sleep infinity
      "
    restart: unless-stopped
