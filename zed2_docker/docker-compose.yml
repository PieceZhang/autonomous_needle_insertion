services:
  zed_ros2_neural:
    image: zed_ros2_desktop_u22.04_sdk_4.2.3_cuda_12.6.3:latest
    container_name: zed_ros2_neural
    privileged: true
    network_mode: host
    ipc: host
    pid: host

    environment:
      - DISPLAY=${DISPLAY}
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=42
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /dev:/dev
      - /dev/shm:/dev/shm

    gpus: all

    stdin_open: true
    tty: true
    restart: "no"

    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        source /root/ros2_ws/install/local_setup.bash &&
        apt-get update &&
        apt-get install -y ros-humble-rmw-cyclonedds-cpp &&
        apt install -y ros-humble-rviz2 &&
        source /opt/ros/humble/setup.bash &&
        ros2 launch zed_wrapper zed_camera.launch.py camera_model:=zed2 depth_quality:=NEURAL
      "
